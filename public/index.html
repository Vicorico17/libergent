<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>libergent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">căutare second-hand în românia</p>
        <h1>libergent</h1>
        <p class="lede">Spune produsul dorit, iar agentul caută pe piața liberă cele mai bune oferte.</p>
      </section>

      <section class="search-panel">
        <form id="searchForm" class="search-form">
          <label class="field grow">
            <span>Produs</span>
            <input id="queryInput" name="q" type="search" placeholder="iphone 15 pro, playstation 5, scaun herman miller..." required />
          </label>

          <label class="field">
            <span>Stare</span>
            <select id="conditionInput" name="condition">
              <option value="any">Oricare</option>
              <option value="new">Nou</option>
              <option value="used">Folosit</option>
            </select>
          </label>

          <button id="searchButton" type="submit">Caută</button>
        </form>
      </section>

      <section id="summary" class="summary hidden"></section>
      <section id="status" class="status"></section>
      <section id="marketplaces" class="grid"></section>
    </main>

    <div id="loadingOverlay" class="loading-overlay hidden" aria-hidden="true">
      <div class="loading-card">
        <div class="loading-ring" aria-hidden="true"></div>
        <p class="loading-eyebrow">libergent lucrează</p>
        <h2 id="loadingTitle">Caut oferte relevante...</h2>
        <p id="loadingText" class="loading-text">Verific OLX, Vinted, Lajumate și Okazii și ordonez rezultatele.</p>
        <div class="loading-marketplaces" aria-hidden="true">
          <span>OLX</span>
          <span>Vinted</span>
          <span>Lajumate</span>
          <span>Okazii</span>
        </div>
      </div>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
